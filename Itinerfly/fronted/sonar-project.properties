sonar.projectKey=itinerfly
sonar.projectName=itinerfly
sonar.sources=src
sonar.tests=src/tests

# Excluir archivos que no aportan cobertura real
sonar.exclusions=\
  src/tests/**,\
  src/main.jsx,\
  src/data/mockData.js,\
  src/index.css,\
  **/*.config.js,\
  **/node_modules/**

# Excluir del análisis de duplicaciones los datos estáticos
sonar.cpd.exclusions=\
  src/data/mockData.js,\
  src/index.css

# Ruta al reporte de cobertura generado por Vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar.javascript.environments=browser
